name: CI/CD Deployment to Oracle Cloud

on:
  push:
    branches:
      - main # Triggers the workflow only on pushes to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Deployment Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: '149.118.54.84'          # Your Oracle Instance Public IP
          username: 'ubuntu'             # Default Oracle Ubuntu username
          key: ${{ secrets.OCI_PRIVATE_KEY }} # Pulls your secured secret key
          port: 22
          script: |
            cd /home/ubuntu/reportbly-server
            git pull origin main
            docker compose up --build -d